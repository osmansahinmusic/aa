<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Infinite Dungeon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background-color: #222;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    pre {
      font-family: monospace;
      background: #333;
      padding: 10px;
      border-radius: 5px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .controls {
      margin-bottom: 20px;
    }
    button {
      font-size: 16px;
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #007bff;
      color: #fff;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>2D Infinite Dungeon Generator</h1>
  <div class="controls">
    <button onclick="generateAndDisplay()">Generate New Chunk</button>
  </div>
  <pre id="output"></pre>

  <script>
    // ============================
    // JavaScript Dungeon Generator
    // ============================
    // Paste your script here!
    // ======================================================

    // Define TILE TYPES
    const TILE = {
      WALL: 0, FLOOR: 1, ROOM: 2, CORRIDOR: 3, GATEWAY: 4
    };

    function tileToChar(tile) {
      switch (tile) {
        case TILE.WALL: return "#";
        case TILE.FLOOR: return ".";
        case TILE.ROOM: return "R";
        case TILE.CORRIDOR: return "+";
        case TILE.GATEWAY: return "G";
        default: return "?";
      }
    }

    // ... Paste all your generator code here.
    // For example:
    const DEFAULT_PARAMS = {
      chunkWidth: 64, chunkHeight: 64, globalSeed: 987654321,
      initialWallDensity: 0.45, caIterations: 5, roomChance: 0.8, corridorWidth: 2,
    };

    function printChunk(chunk) {
      const map = chunk.tilemap;
      let output = "";
      for (let y = 0; y < map.height; y++) {
        let row = "";
        for (let x = 0; x < map.width; x++) {
          row += tileToChar(map.get(x, y));
        }
        output += row + "\n";
      }
      return output;
    }

    function generateAndDisplay() {
      const chunk = generateChunk(0, 0, DEFAULT_PARAMS);
      
      document.getElementById('output').textContent = printChunk(chunk);
    }

    // Ensure `generateChunk` and other dependencies are properly pasted here.
    // Copy your entire dungeon generation logic after this comment.

    // Full script from your code here... 
  </script>
</body>
</html>
