<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #00ff00;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff00;
      color: #00ff88;
    }
    
    .container {
      background: #0f0f1e;
      border: 3px solid #00ff00;
      border-radius: 10px;
      padding: 30px;
      max-width: 900px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    button {
      padding: 12px 30px;
      font-size: 16px;
      background: #00ff00;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }
    
    button:hover {
      background: #00dd00;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
    }
    
    button:active {
      transform: scale(0.95);
    }
    
    .map-container {
      background: #000;
      border: 2px solid #00aa00;
      padding: 15px;
      border-radius: 5px;
      overflow: auto;
      max-height: 600px;
      margin: 20px 0;
    }
    
    .map {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.2;
      white-space: pre;
      color: #00ff00;
      text-shadow: 0 0 5px #00ff00;
    }
    
    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 20px;
      padding: 15px;
      background: #1a1a2e;
      border: 1px solid #00ff00;
      border-radius: 5px;
    }
    
    .legend-item {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .legend-symbol {
      font-weight: bold;
      font-size: 18px;
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #333;
      border-radius: 3px;
    }
    
    .info {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #00dd00;
    }
  </style>
</head>
<body>
  <h1>🏰 DUNGEON GENERATOR</h1>
  
  <div class="container">
    <div class="controls">
      <button onclick="generateMap()">⚔️ YENİ DUNGEON OLUŞTUR</button>
      <button onclick="generateMap()">🔄 YENILE</button>
    </div>
    
    <div class="map-container">
      <div class="map" id="mapOutput">Dungeon oluşturuluyor...</div>
    </div>
    
    <div class="legend">
      <div class="legend-item">
        <div class="legend-symbol">#</div>
        <div>Duvar</div>
      </div>
      <div class="legend-item">
        <div class="legend-symbol">.</div>
        <div>Zemin</div>
      </div>
      <div class="legend-item">
        <div class="legend-symbol">█</div>
        <div>Oda</div>
      </div>
      <div class="legend-item">
        <div class="legend-symbol">+</div>
        <div>Koridor</div>
      </div>
      <div class="legend-item">
        <div class="legend-symbol">@</div>
        <div>Giriş</div>
      </div>
    </div>
    
    <div class="info">
      <p>Harita boyutu: 50x30</p>
    </div>
  </div>

  <script>
    // Basit Random Generator
    function Random(seed) {
      return {
        seed: seed,
        next() {
          this.seed = (this.seed * 9301 + 49297) % 233280;
          return this.seed / 233280;
        },
        range(min, max) {
          return Math.floor(this.next() * (max - min)) + min;
        }
      };
    }

    // Harita oluştur
    function generateMap() {
      const width = 50;
      const height = 30;
      
      // Haritayı duvarlarla doldur
      let map = [];
      for (let y = 0; y < height; y++) {
        map[y] = [];
        for (let x = 0; x < width; x++) {
          map[y][x] = '#';
        }
      }

      // Random generator
      const rng = Random(Date.now());

      // Rastgele odalar oluştur
      const roomCount = rng.range(5, 10);
      const rooms = [];

      for (let i = 0; i < roomCount; i++) {
        const roomWidth = rng.range(6, 14);
        const roomHeight = rng.range(4, 10);
        const roomX = rng.range(2, width - roomWidth - 2);
        const roomY = rng.range(2, height - roomHeight - 2);

        rooms.push({
          x: roomX,
          y: roomY,
          width: roomWidth,
          height: roomHeight
        });

        // Odayı haritaya çiz
        for (let y = roomY; y < roomY + roomHeight; y++) {
          for (let x = roomX; x < roomX + roomWidth; x++) {
            map[y][x] = '█';
          }
        }
      }

      // Odaları birbirine bağla (koridorlar)
      for (let i = 0; i < rooms.length - 1; i++) {
        const room1 = rooms[i];
        const room2 = rooms[i + 1];

        const x1 = Math.floor(room1.x + room1.width / 2);
        const y1 = Math.floor(room1.y + room1.height / 2);
        const x2 = Math.floor(room2.x + room2.width / 2);
        const y2 = Math.floor(room2.y + room2.height / 2);

        // Yatay çizgi
        const startX = Math.min(x1, x2);
        const endX = Math.max(x1, x2);
        for (let x = startX; x <= endX; x++) {
          if (map[y1][x] === '#') {
            map[y1][x] = '+';
          }
        }

        // Dikey çizgi
        const startY = Math.min(y1, y2);
        const endY = Math.max(y1, y2);
        for (let y = startY; y <= endY; y++) {
          if (map[y][x2] === '#') {
            map[y][x2] = '+';
          }
        }
      }

      // Zemin ekle
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          if (map[y][x] === '#' && rng.next() < 0.3) {
            map[y][x] = '.';
          }
        }
      }

      // Giriş noktası ekle
      if (rooms.length > 0) {
        const firstRoom = rooms[0];
        const entryX = Math.floor(firstRoom.x + firstRoom.width / 2);
        const entryY = Math.floor(firstRoom.y + firstRoom.height / 2);
        map[entryY][entryX] = '@';
      }

      // Haritayı ekrana yazdır
      let mapString = '';
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          mapString += map[y][x];
        }
        mapString += '\n';
      }

      document.getElementById('mapOutput').textContent = mapString;
    }

    // Sayfa yüklendiğinde ilk haritayı oluştur
    window.addEventListener('load', generateMap);
  </script>
</body>
</html>
