<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }
    
    .game-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #0a0a0a;
      padding: 20px;
      border: 3px solid #ffaa00;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255, 170, 0, 0.3);
    }
    
    h1 {
      text-align: center;
      color: #ffaa00;
      text-shadow: 0 0 10px #ffaa00;
      margin-bottom: 10px;
    }
    
    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #ffaa00;
      border-radius: 5px;
    }
    
    .hud-item {
      text-align: center;
    }
    
    .hud-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    
    .hud-value {
      font-size: 20px;
      color: #ffaa00;
      font-weight: bold;
    }
    
    .hp-bar {
      width: 100%;
      height: 20px;
      background: #333;
      border: 1px solid #666;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 5px;
    }
    
    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
      width: 100%;
      transition: width 0.3s;
    }
    
    canvas {
      background: #000;
      border: 2px solid #666;
      display: block;
      margin: 0 auto;
    }
    
    .controls {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 10px;
      background: rgba(255, 170, 0, 0.1);
      border: 1px solid #ffaa00;
      border-radius: 5px;
    }
    
    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 10px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #666;
      border-radius: 5px;
      font-size: 13px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .legend-symbol {
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border: 1px solid #666;
      border-radius: 3px;
    }
    
    .symbol-player { background: #ffaa00; color: #000; }
    .symbol-enemy { background: #ff3333; color: #fff; }
    .symbol-treasure { background: #ffff00; color: #000; }
    
    .game-over {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.95);
      padding: 40px;
      border: 3px solid #ffaa00;
      border-radius: 10px;
      text-align: center;
      z-index: 100;
      display: none;
      box-shadow: 0 0 30px rgba(255, 170, 0, 0.8);
    }
    
    .game-over.show {
      display: block;
    }
    
    .game-over h2 {
      font-size: 40px;
      margin-bottom: 20px;
      color: #ffaa00;
      text-shadow: 0 0 10px #ffaa00;
    }
    
    .game-over p {
      font-size: 20px;
      margin-bottom: 30px;
      color: #fff;
    }
    
    .game-over button {
      padding: 15px 40px;
      font-size: 16px;
      background: #ffaa00;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    
    .game-over button:hover {
      background: #ff9900;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>⚔️ DUNGEON GAME ⚔️</h1>
    
    <div class="hud">
      <div class="hud-item">
        <div class="hud-label">HP</div>
        <div class="hp-bar">
          <div class="hp-fill" id="hpFill"></div>
        </div>
        <div class="hud-value" id="hpValue">100/100</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Skor</div>
        <div class="hud-value" id="scoreValue">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Düşmanlar</div>
        <div class="hud-value" id="enemyCount">5</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Level</div>
        <div class="hud-value" id="levelValue">1</div>
      </div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="controls">
      <strong>KONTROLLER:</strong><br>
      ⬅️➡️⬆️⬇️ veya WASD = Hareket | SPACE = Saldır
    </div>
    
    <div class="legend">
      <div class="legend-item">
        <div class="legend-symbol symbol-player">@</div>
        <div>Oyuncu</div>
      </div>
      <div class="legend-item">
        <div class="legend-symbol symbol-enemy">E</div>
        <div>Düşman</div>
      </div>
      <div class="legend-item">
        <div class="legend-symbol symbol-treasure">G</div>
        <div>Hazine</div>
      </div>
    </div>
  </div>

  <div class="game-over" id="gameOverModal">
    <h2 id="gameOverTitle">GAME OVER</h2>
    <p id="gameOverText">Skor: 0</p>
    <button onclick="location.reload()">OYUNU YENİDEN BAŞLAT</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Oyun değişkenleri
    const tileSize = 30;
    const mapWidth = Math.floor(canvas.width / tileSize);
    const mapHeight = Math.floor(canvas.height / tileSize);

    let gameState = {
      isRunning: true,
      score: 0,
      level: 1,
      treasuresCollected: 0
    };

    // Oyuncu
    let player = {
      x: 10,
      y: 10,
      hp: 100,
      maxHp: 100,
      attackRange: 50,
      damage: 20,
      moveSpeed: 1
    };

    // Düşmanlar
    let enemies = [];
    function initEnemies() {
      enemies = [];
      const enemyCount = 3 + gameState.level;
      for (let i = 0; i < enemyCount; i++) {
        enemies.push({
          x: Math.random() * (mapWidth - 4) + 2,
          y: Math.random() * (mapHeight - 4) + 2,
          hp: 30,
          maxHp: 30,
          damage: 10,
          moveSpeed: 0.5 + gameState.level * 0.1,
          attackRange: 40
        });
      }
    }

    // Hazineler
    let treasures = [];
    function initTreasures() {
      treasures = [];
      const treasureCount = 1 + gameState.level;
      for (let i = 0; i < treasureCount; i++) {
        treasures.push({
          x: Math.random() * (mapWidth - 4) + 2,
          y: Math.random() * (mapHeight - 4) + 2,
          collected: false
        });
      }
    }

    // Girdi sistemi
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') {
        e.preventDefault();
        playerAttack();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // Oyuncu hareketi
    function updatePlayer() {
      let newX = player.x;
      let newY = player.y;

      if (keys['w'] || keys['arrowup']) newY -= player.moveSpeed;
      if (keys['s'] || keys['arrowdown']) newY += player.moveSpeed;
      if (keys['a'] || keys['arrowleft']) newX -= player.moveSpeed;
      if (keys['d'] || keys['arrowright']) newX += player.moveSpeed;

      // Sınırlar
      newX = Math.max(0, Math.min(mapWidth - 1, newX));
      newY = Math.max(0, Math.min(mapHeight - 1, newY));

      player.x = newX;
      player.y = newY;
    }

    // Düşman hareketi
    function updateEnemies() {
      enemies.forEach((enemy, index) => {
        if (enemy.hp <= 0) {
          enemies.splice(index, 1);
          gameState.score += 50;
          return;
        }

        // Oyuncuya doğru hareket et
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 0.5) {
          enemy.x += (dx / distance) * enemy.moveSpeed;
          enemy.y += (dy / distance) * enemy.moveSpeed;
        }

        // Oyuncuya saldır
        if (distance < 1.5) {
          player.hp -= enemy.damage * 0.016; // Delta time
          if (player.hp < 0) player.hp = 0;
        }
      });
    }

    // Hazine koleksiyon
    function checkTreasures() {
      treasures.forEach((treasure) => {
        if (!treasure.collected) {
          const dx = player.x - treasure.x;
          const dy = player.y - treasure.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 1) {
            treasure.collected = true;
            gameState.score += 100;
            gameState.treasuresCollected++;

            // Yeni level
            if (gameState.treasuresCollected % 2 === 0) {
              gameState.level++;
              initEnemies();
              initTreasures();
            }
          }
        }
      });
    }

    // Oyuncu saldırısı
    function playerAttack() {
      enemies.forEach((enemy) => {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < player.attackRange / tileSize) {
          enemy.hp -= player.damage;
          if (enemy.hp < 0) enemy.hp = 0;
        }
      });
    }

    // Çizim
    function draw() {
      // Arka plan
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= mapWidth; i++) {
        ctx.beginPath();
        ctx.moveTo(i * tileSize, 0);
        ctx.lineTo(i * tileSize, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i <= mapHeight; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * tileSize);
        ctx.lineTo(canvas.width, i * tileSize);
        ctx.stroke();
      }

      // Oyuncu çiz
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(player.x * tileSize + 5, player.y * tileSize + 5, tileSize - 10, tileSize - 10);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('@', player.x * tileSize + tileSize / 2, player.y * tileSize + tileSize / 2);

      // Düşmanları çiz
      enemies.forEach((enemy) => {
        // HP bar
        const barWidth = tileSize - 10;
        const barHeight = 3;
        ctx.fillStyle = '#333';
        ctx.fillRect(enemy.x * tileSize + 5, enemy.y * tileSize + 2, barWidth, barHeight);
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(enemy.x * tileSize + 5, enemy.y * tileSize + 2, barWidth * (enemy.hp / enemy.maxHp), barHeight);

        // Düşman
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(enemy.x * tileSize + 5, enemy.y * tileSize + 5, tileSize - 10, tileSize - 10);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.fillText('E', enemy.x * tileSize + tileSize / 2, enemy.y * tileSize + tileSize / 2);
      });

      // Hazineleri çiz
      treasures.forEach((treasure) => {
        if (!treasure.collected) {
          ctx.fillStyle = '#ffff00';
          ctx.fillRect(treasure.x * tileSize + 8, treasure.y * tileSize + 8, tileSize - 16, tileSize - 16);
          ctx.fillStyle = '#000';
          ctx.font = 'bold 14px Arial';
          ctx.fillText('G', treasure.x * tileSize + tileSize / 2, treasure.y * tileSize + tileSize / 2);
        }
      });

      // Saldırı alanı göster (opsiyonel)
      ctx.strokeStyle = 'rgba(255, 170, 0, 0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(player.x * tileSize + tileSize / 2, player.y * tileSize + tileSize / 2, player.attackRange, 0, Math.PI * 2);
      ctx.stroke();
    }

    // HUD güncelle
    function updateHUD() {
      document.getElementById('hpValue').textContent = `${Math.ceil(player.hp)}/${player.maxHp}`;
      document.getElementById('hpFill').style.width = (player.hp / player.maxHp) * 100 + '%';
      document.getElementById('scoreValue').textContent = gameState.score;
      document.getElementById('enemyCount').textContent = enemies.length;
      document.getElementById('levelValue').textContent = gameState.level;
    }

    // Oyun döngüsü
    function gameLoop() {
      if (!gameState.isRunning) {
        return;
      }

      // Güncelle
      updatePlayer();
      updateEnemies();
      checkTreasures();
      updateHUD();

      // Çiz
      draw();

      // Oyun bitti kontrol
      if (player.hp <= 0) {
        gameState.isRunning = false;
        document.getElementById('gameOverTitle').textContent = 'ÖLDÜN!';
        document.getElementById('gameOverText').textContent = `Final Skor: ${gameState.score} | Level: ${gameState.level}`;
        document.getElementById('gameOverModal').classList.add('show');
        return;
      }

      requestAnimationFrame(gameLoop);
    }

    // Başlat
    initEnemies();
    initTreasures();
    gameLoop();
  </script>
</body>
</html>
