<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Infinite Dungeon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background-color: #222;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      color: #ffaa00;
    }
    pre {
      font-family: 'Courier New', monospace;
      background: #111;
      padding: 15px;
      border: 2px solid #444;
      border-radius: 5px;
      overflow: auto;
      white-space: pre-wrap;
      max-width: 900px;
      min-height: 400px;
      color: #0f0;
      text-shadow: 0 0 5px #0f0;
    }
    .controls {
      margin-bottom: 20px;
    }
    button {
      font-size: 16px;
      padding: 12px 24px;
      margin: 5px;
      border: 2px solid #007bff;
      border-radius: 5px;
      cursor: pointer;
      background-color: #007bff;
      color: #fff;
      font-weight: bold;
      transition: all 0.3s;
    }
    button:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    .info {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      max-width: 900px;
    }
    .legend {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .legend-item {
      background: #333;
      padding: 5px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>🏰 2D Infinite Dungeon Generator</h1>
  <div class="controls">
    <button onclick="generateAndDisplay()">🎲 Generate New Dungeon</button>
  </div>
  <pre id="output">Initializing...</pre>
  <div class="info">
    <div class="legend">
      <div class="legend-item"><strong>#</strong> = Wall</div>
      <div class="legend-item"><strong>.</strong> = Floor</div>
      <div class="legend-item"><strong>R</strong> = Room</div>
      <div class="legend-item"><strong>+</strong> = Corridor</div>
      <div class="legend-item"><strong>G</strong> = Gateway</div>
    </div>
    <p style="margin-top: 15px; color: #888;">Click the button to generate new dungeons!</p>
  </div>

  <script>
    console.log("Script starting...");

    // Define TILE TYPES
    const TILE = {
      WALL: 0, 
      FLOOR: 1, 
      ROOM: 2, 
      CORRIDOR: 3, 
      GATEWAY: 4
    };

    function tileToChar(tile) {
      switch (tile) {
        case TILE.WALL: return "#";
        case TILE.FLOOR: return ".";
        case TILE.ROOM: return "R";
        case TILE.CORRIDOR: return "+";
        case TILE.GATEWAY: return "G";
        default: return "?";
      }
    }

    // Seeded random number generator
    class SeededRandom {
      constructor(seed) {
        this.seed = Math.abs(seed) || 1;
      }

      next() {
        this.seed = (this.seed * 9301 + 49297) % 233280;
        return this.seed / 233280;
      }

      range(min, max) {
        if (min >= max) return min;
        return min + Math.floor(this.next() * (max - min));
      }
    }

    // 2D tilemap
    class Tilemap {
      constructor(width, height) {
        this.width = width;
        this.height = height;
        this.tiles = new Array(width * height);
        for (let i = 0; i < this.tiles.length; i++) {
          this.tiles[i] = TILE.WALL;
        }
      }

      get(x, y) {
        if (x < 0 || x >= this.width || y < 0 || y >= this.height) return TILE.WALL;
        return this.tiles[y * this.width + x];
      }

      set(x, y, tile) {
        if (x >= 0 && x < this.width && y >= 0 && y < this.height) {
          this.tiles[y * this.width + x] = tile;
        }
      }
    }

    // Generate dungeon chunk
    function generateChunk(chunkX, chunkY) {
      const width = 64;
      const height = 64;
      const tilemap = new Tilemap(width, height);
      
      const seed = 987654321 + (chunkX * 73856093) ^ (chunkY * 19349663);
      const rng = new SeededRandom(seed);

      // Fill with random walls and floors
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const rand = rng.next();
          if (rand < 0.4) {
            tilemap.set(x, y, TILE.FLOOR);
          } else if (rand < 0.55) {
            tilemap.set(x, y, TILE.ROOM);
          } else {
            tilemap.set(x, y, TILE.WALL);
          }
        }
      }

      // Generate rectangular rooms
      for (let i = 0; i < 6; i++) {
        const roomWidth = rng.range(5, 12);
        const roomHeight = rng.range(5, 12);
        const roomX = rng.range(2, width - roomWidth - 2);
        const roomY = rng.range(2, height - roomHeight - 2);

        for (let dy = 0; dy < roomHeight; dy++) {
          for (let dx = 0; dx < roomWidth; dx++) {
            tilemap.set(roomX + dx, roomY + dy, TILE.ROOM);
          }
        }
      }

      // Add corridors between rooms
      for (let i = 0; i < 15; i++) {
        const x1 = rng.range(0, width);
        const y1 = rng.range(0, height);
        const x2 = rng.range(0, width);
        const y2 = rng.range(0, height);

        // Draw corridor
        let x = x1;
        let y = y1;
        const dx = x2 > x1 ? 1 : (x2 < x1 ? -1 : 0);
        const dy = y2 > y1 ? 1 : (y2 < y1 ? -1 : 0);

        while (x !== x2) {
          tilemap.set(x, y, TILE.CORRIDOR);
          x += dx;
        }
        while (y !== y2) {
          tilemap.set(x, y, TILE.CORRIDOR);
          y += dy;
        }
      }

      // Add some gateways
      for (let i = 0; i < 3; i++) {
        const x = rng.range(10, width - 10);
        const y = rng.range(10, height - 10);
        tilemap.set(x, y, TILE.GATEWAY);
      }

      return tilemap;
    }

    function printTilemap(tilemap) {
      let output = "";
      for (let y = 0; y < tilemap.height; y++) {
        let row = "";
        for (let x = 0; x < tilemap.width; x++) {
          row += tileToChar(tilemap.get(x, y));
        }
        output += row + "\n";
      }
      return output;
    }

    function generateAndDisplay() {
      try {
        console.log("Generating dungeon...");
        const chunkX = Math.floor(Math.random() * 10000);
        const chunkY = Math.floor(Math.random() * 10000);
        const tilemap = generateChunk(chunkX, chunkY);
        const output = printTilemap(tilemap);
        document.getElementById('output').textContent = output;
        console.log("Dungeon generated successfully!");
      } catch (error) {
        console.error("Error generating dungeon:", error);
        document.getElementById('output').textContent = "ERROR: " + error.message;
      }
    }

    // Generate initial dungeon when page loads
    console.log("Page loaded, generating initial dungeon...");
    generateAndDisplay();
  </script>
</body>
</html>
