<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #ff6600;
      color: #ffaa00;
    }
    
    .container {
      background: #0f0f1e;
      border: 3px solid #ffaa00;
      border-radius: 10px;
      padding: 30px;
      max-width: 1000px;
      box-shadow: 0 0 20px rgba(255, 170, 0, 0.3);
    }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    button {
      padding: 12px 30px;
      font-size: 16px;
      background: #ffaa00;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
    }
    
    button:hover {
      background: #ff9900;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 170, 0, 0.8);
    }
    
    button:active {
      transform: scale(0.95);
    }
    
    .map-container {
      background: #000;
      border: 2px solid #ffaa00;
      padding: 15px;
      border-radius: 5px;
      overflow: auto;
      max-height: 600px;
      margin: 20px 0;
      display: inline-block;
      margin-left: auto;
      margin-right: auto;
    }
    
    .map {
      display: grid;
      grid-template-columns: repeat(50, 1fr);
      gap: 1px;
      background: #000;
      padding: 10px;
    }
    
    .tile {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      border-radius: 2px;
      transition: all 0.1s;
    }
    
    .tile.wall {
      background: #333;
      color: #666;
      border: 1px solid #444;
    }
    
    .tile.room {
      background: #4a90e2;
      color: #000;
      border: 1px solid #2e5c8a;
    }
    
    .tile.corridor {
      background: #8b7355;
      color: #fff;
      border: 1px solid #5d4e37;
    }
    
    .tile.floor {
      background: #555;
      color: #888;
      border: 1px solid #666;
    }
    
    .tile.entry {
      background: #ffaa00;
      color: #000;
      border: 1px solid #ff8800;
      box-shadow: 0 0 5px #ffaa00;
    }
    
    .tile:hover {
      transform: scale(1.2);
      z-index: 10;
      box-shadow: 0 0 10px rgba(255, 170, 0, 0.8);
    }
    
    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
      padding: 15px;
      background: #1a1a2e;
      border: 1px solid #ffaa00;
      border-radius: 5px;
    }
    
    .legend-item {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .legend-symbol {
      font-weight: bold;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
    }
    
    .legend-wall .legend-symbol {
      background: #333;
      border: 1px solid #666;
    }
    
    .legend-room .legend-symbol {
      background: #4a90e2;
      border: 1px solid #2e5c8a;
    }
    
    .legend-corridor .legend-symbol {
      background: #8b7355;
      border: 1px solid #5d4e37;
    }
    
    .legend-floor .legend-symbol {
      background: #555;
      border: 1px solid #666;
    }
    
    .legend-entry .legend-symbol {
      background: #ffaa00;
      border: 1px solid #ff8800;
      box-shadow: 0 0 5px #ffaa00;
    }
    
    .info {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #ffaa00;
    }
    
    .map-wrapper {
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>🏰 DUNGEON GENERATOR</h1>
  
  <div class="container">
    <div class="controls">
      <button onclick="generateMap()">⚔️ YENİ DUNGEON OLUŞTUR</button>
      <button onclick="generateMap()">🔄 YENILE</button>
    </div>
    
    <div class="map-wrapper">
      <div class="map-container">
        <div class="map" id="mapOutput">Dungeon oluşturuluyor...</div>
      </div>
    </div>
    
    <div class="legend">
      <div class="legend-item legend-wall">
        <div class="legend-symbol"></div>
        <div>Duvar</div>
      </div>
      <div class="legend-item legend-floor">
        <div class="legend-symbol"></div>
        <div>Zemin</div>
      </div>
      <div class="legend-item legend-room">
        <div class="legend-symbol"></div>
        <div>Oda</div>
      </div>
      <div class="legend-item legend-corridor">
        <div class="legend-symbol"></div>
        <div>Koridor</div>
      </div>
      <div class="legend-item legend-entry">
        <div class="legend-symbol">@</div>
        <div>Giriş Noktası</div>
      </div>
    </div>
    
    <div class="info">
      <p>Harita boyutu: 50x30 | Tile: 18px</p>
    </div>
  </div>

  <script>
    // Basit Random Generator
    function Random(seed) {
      return {
        seed: seed,
        next() {
          this.seed = (this.seed * 9301 + 49297) % 233280;
          return this.seed / 233280;
        },
        range(min, max) {
          return Math.floor(this.next() * (max - min)) + min;
        }
      };
    }

    // Harita oluştur
    function generateMap() {
      const width = 50;
      const height = 30;
      
      // Haritayı duvarlarla doldur
      let map = [];
      for (let y = 0; y < height; y++) {
        map[y] = [];
        for (let x = 0; x < width; x++) {
          map[y][x] = 'wall';
        }
      }

      // Random generator
      const rng = Random(Date.now());

      // Rastgele odalar oluştur
      const roomCount = rng.range(6, 12);
      const rooms = [];

      for (let i = 0; i < roomCount; i++) {
        const roomWidth = rng.range(7, 15);
        const roomHeight = rng.range(5, 11);
        const roomX = rng.range(2, width - roomWidth - 2);
        const roomY = rng.range(2, height - roomHeight - 2);

        rooms.push({
          x: roomX,
          y: roomY,
          width: roomWidth,
          height: roomHeight
        });

        // Odayı haritaya çiz
        for (let y = roomY; y < roomY + roomHeight; y++) {
          for (let x = roomX; x < roomX + roomWidth; x++) {
            map[y][x] = 'room';
          }
        }
      }

      // Odaları birbirine bağla (koridorlar)
      for (let i = 0; i < rooms.length - 1; i++) {
        const room1 = rooms[i];
        const room2 = rooms[i + 1];

        const x1 = Math.floor(room1.x + room1.width / 2);
        const y1 = Math.floor(room1.y + room1.height / 2);
        const x2 = Math.floor(room2.x + room2.width / 2);
        const y2 = Math.floor(room2.y + room2.height / 2);

        // Yatay çizgi
        const startX = Math.min(x1, x2);
        const endX = Math.max(x1, x2);
        for (let x = startX; x <= endX; x++) {
          if (map[y1][x] === 'wall') {
            map[y1][x] = 'corridor';
          }
        }

        // Dikey çizgi
        const startY = Math.min(y1, y2);
        const endY = Math.max(y1, y2);
        for (let y = startY; y <= endY; y++) {
          if (map[y][x2] === 'wall') {
            map[y][x2] = 'corridor';
          }
        }
      }

      // Zemin ekle
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          if (map[y][x] === 'wall' && rng.next() < 0.25) {
            map[y][x] = 'floor';
          }
        }
      }

      // Giriş noktası ekle
      if (rooms.length > 0) {
        const firstRoom = rooms[0];
        const entryX = Math.floor(firstRoom.x + firstRoom.width / 2);
        const entryY = Math.floor(firstRoom.y + firstRoom.height / 2);
        map[entryY][entryX] = 'entry';
      }

      // Haritayı ekrana yazdır
      const mapOutput = document.getElementById('mapOutput');
      mapOutput.innerHTML = '';
      
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const tile = document.createElement('div');
          tile.className = 'tile ' + map[y][x];
          
          if (map[y][x] === 'entry') {
            tile.innerHTML = '@';
          }
          
          mapOutput.appendChild(tile);
        }
      }
    }

    // Sayfa yüklendiğinde ilk haritayı oluştur
    window.addEventListener('load', generateMap);
  </script>
</body>
</html>
